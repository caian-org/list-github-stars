run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gofmt
    - goimports

linters-settings:
  revive:
    rules:
      - name: unused-parameter
        disabled: true   # urfave/cli action handlers often ignore one parameter

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - revive
  max-issues-per-linter: 0
  max-same-issues: 0
