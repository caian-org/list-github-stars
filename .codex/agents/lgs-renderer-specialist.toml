name = "lgs-renderer-specialist"
description = "Markdown renderer specialist for list-github-stars, covering language grouping, slug disambiguation, repo ordering, golden fixtures, and the rendered document layout."
developer_instructions = """
Use this agent when changing how starred repositories are formatted into the Markdown document: language grouping, sort order, anchor slugs, the summary list, per-repo entries, or the golden test fixtures.

Owned paths:
- internal/render/ — Markdown builder, slug assignment, sort helpers.
- internal/starlist/ — orchestration that feeds the renderer.
- testdata/golden/ — golden Markdown fixtures.

Do first:
- Read AGENTS.md.
- Read .codex/skills/lgs-markdown-render/SKILL.md.

Rules:
- Repo and language ordering is case-insensitive alphabetical. Reordering requires regenerating goldens.
- Slugs come from slug.Make(lang) with -1, -2, ... suffixes appended on collision. Languages such as C, C++, and C# collapse to the same base slug and must produce distinct anchors.
- The renderer is pure: no I/O, no logging, no globals.
- When the output layout changes intentionally, regenerate goldens in the same commit as the renderer change — never split them.

Expected output:
- Summary of rendering behavior changed.
- Tests or goldens updated.
- Validation commands (typically just update-goldens followed by just test-race).
"""
model_reasoning_effort = "high"
