name: daily-run

on:
  workflow_dispatch:

  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  packages: read

jobs:
  daily-run:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stars markdown and update gist
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          docker run --rm \
            -e GITHUB_TOKEN="$AUTH_TOKEN" \
            ghcr.io/caian-org/list-github-stars:latest \
            > my-github-stars.md

          GH_TOKEN="$AUTH_TOKEN" gh gist edit ada2117bd8c73a1e94e49580fd5c7cf7 --add my-github-stars.md
